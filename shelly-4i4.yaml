blueprint:
  name: Shelly Wave I4 (Z-Wave) 4 Button Actions
  description: For the Shelly Wave I4 (QNSN-0A24X) connected via Z-Wave JS.
  domain: automation
  input:
    button:
      name: Device
      description: Choose your Shelly Wave I4 Z-Wave device
      selector:
        device:
          manufacturer: Shelly Europe Ltd.
          model: QNSN-0A24X
          multiple: false

    pressb1:
      name: Button 1 - Single Press
      default: []
      selector:
        action: {}
    releaseb1:
      name: Button 1 - Released
      default: []
      selector:
        action: {}
    doubleb1:
      name: Button 1 - Double Press
      default: []
      selector:
        action: {}
    longb1:
      name: Button 1 - Held Down
      default: []
      selector:
        action: {}

    pressb2:
      name: Button 2 - Single Press
      default: []
      selector:
        action: {}
    releaseb2:
      name: Button 2 - Released
      default: []
      selector:
        action: {}
    doubleb2:
      name: Button 2 - Double Press
      default: []
      selector:
        action: {}
    longb2:
      name: Button 2 - Held Down
      default: []
      selector:
        action: {}

    pressb3:
      name: Button 3 - Single Press
      default: []
      selector:
        action: {}
    releaseb3:
      name: Button 3 - Released
      default: []
      selector:
        action: {}
    doubleb3:
      name: Button 3 - Double Press
      default: []
      selector:
        action: {}
    longb3:
      name: Button 3 - Held Down
      default: []
      selector:
        action: {}

    pressb4:
      name: Button 4 - Single Press
      default: []
      selector:
        action: {}
    releaseb4:
      name: Button 4 - Released
      default: []
      selector:
        action: {}
    doubleb4:
      name: Button 4 - Double Press
      default: []
      selector:
        action: {}
    longb4:
      name: Button 4 - Held Down
      default: []
      selector:
        action: {}

mode: restart
max_exceeded: silent

variables:
  button_device: !input button

trigger:
  - platform: event
    event_type: zwave_js_value_notification

condition:
  - condition: template
    value_template: >
      {{ trigger.event.data.device_id == button_device and
         trigger.event.data.command_class_name == 'Central Scene' }}

action:
  - choose:
    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '001' and trigger.event.data.value | string in ['0', 'KeyPressed'] }}"
      sequence: !input pressb1
    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '001' and trigger.event.data.value | string in ['1', 'KeyReleased'] }}"
      sequence: !input releaseb1
    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '001' and trigger.event.data.value | string in ['3', 'KeyPressed2x'] }}"
      sequence: !input doubleb1
    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '001' and trigger.event.data.value | string in ['2', 'KeyHeldDown'] }}"
      sequence: !input longb1

    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '002' and trigger.event.data.value | string in ['0', 'KeyPressed'] }}"
      sequence: !input pressb2
    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '002' and trigger.event.data.value | string in ['1', 'KeyReleased'] }}"
      sequence: !input releaseb2
    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '002' and trigger.event.data.value | string in ['3', 'KeyPressed2x'] }}"
      sequence: !input doubleb2
    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '002' and trigger.event.data.value | string in ['2', 'KeyHeldDown'] }}"
      sequence: !input longb2

    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '003' and trigger.event.data.value | string in ['0', 'KeyPressed'] }}"
      sequence: !input pressb3
    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '003' and trigger.event.data.value | string in ['1', 'KeyReleased'] }}"
      sequence: !input releaseb3
    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '003' and trigger.event.data.value | string in ['3', 'KeyPressed2x'] }}"
      sequence: !input doubleb3
    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '003' and trigger.event.data.value | string in ['2', 'KeyHeldDown'] }}"
      sequence: !input longb3

    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '004' and trigger.event.data.value | string in ['0', 'KeyPressed'] }}"
      sequence: !input pressb4
    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '004' and trigger.event.data.value | string in ['1', 'KeyReleased'] }}"
      sequence: !input releaseb4
    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '004' and trigger.event.data.value | string in ['3', 'KeyPressed2x'] }}"
      sequence: !input doubleb4
    - conditions:
        - condition: template
          value_template: "{{ trigger.event.data.property_key_name == '004' and trigger.event.data.value | string in ['2', 'KeyHeldDown'] }}"
      sequence: !input longb4
